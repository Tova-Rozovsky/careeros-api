name: CareerOS API — CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: careeros_test
          POSTGRES_USER: careeros
          POSTGRES_PASSWORD: careeros
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/careeros_test
          DB_USERNAME: careeros
          DB_PASSWORD: careeros
          REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-for-ci-minimum-256-bits-long
        run: ./mvnw test --no-transfer-progress

      - name: Build JAR
        run: ./mvnw package -DskipTests --no-transfer-progress

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: careeros-api-jar
          path: target/*.jar
          retention-days: 7

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Check code style
        run: ./mvnw checkstyle:check --no-transfer-progress
        continue-on-error: true
