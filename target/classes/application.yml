spring:
  application:
    name: careeros-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/careeros}
    username: ${DB_USERNAME:careeros}
    password: ${DB_PASSWORD:careeros}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:careeros-secret-key-change-in-production-minimum-256-bits}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8090}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


