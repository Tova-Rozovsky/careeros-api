apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careeros-api-ingress
  namespace: careeros-api
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: api.careeros.local 
    http:
      paths:
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port: 
              number: 8080
      - path: /resumes
        pathType: Prefix
        backend:
          service:
            name: resume-service
            port: 
              number: 8080