apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: careeros-api
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: careeros-api
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: careeros-api
spec:
  ports:
  - name: amqp
    port: 5672
  - name: mgmt
    port: 15672
  selector:
    app: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: careeros-api
spec:
  ports:
  - name: api
    port: 9000
  - name: console
    port: 9001
  selector:
    app: minio